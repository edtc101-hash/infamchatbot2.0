<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인팸 AI 챗봇 | 텍스트 업로드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --gold: #b08d57;
            --gold-light: #c9a96e;
            --green: #22c55e;
            --green-light: #dcfce7;
            --red: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-600: #475569;
            --gray-700: #334155;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--primary);
            min-height: 100vh;
        }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--gold);
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            padding: 8px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: var(--white);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            color: var(--gray-600);
            text-decoration: none;
            transition: all .2s;
        }

        .header-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.6;
        }

        .upload-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            text-align: center;
        }

        .drop-zone {
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius);
            padding: 60px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--gray-100);
        }

        .drop-zone.dragover {
            border-color: var(--gold);
            background: rgba(176, 141, 87, 0.05);
        }

        .drop-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .drop-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .drop-subtext {
            font-size: 13px;
            color: var(--gray-400);
            margin-bottom: 24px;
        }

        .file-input {
            display: none;
        }

        .btn-select {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-select:hover {
            opacity: 0.9;
        }

        .file-list {
            margin-top: 24px;
            text-align: left;
            display: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-icon {
            font-size: 20px;
        }

        .file-name {
            font-size: 14px;
            font-weight: 500;
        }

        .file-size {
            font-size: 12px;
            color: var(--gray-400);
        }

        .file-remove {
            color: var(--red);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upload:hover {
            background: var(--gray-700);
        }

        .btn-upload:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
        }

        /* 상단 고정 액션 바 */
        .sticky-action-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: linear-gradient(135deg, var(--primary), var(--gray-700));
            color: #fff;
            padding: 12px 24px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            margin: 0 -20px;
            width: calc(100% + 40px);
        }

        .sticky-action-bar.show {
            display: flex;
        }

        .sticky-action-bar .sab-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .sticky-action-bar .sab-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .sticky-action-bar .sab-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(176, 141, 87, 0.3);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sticky-action-bar .sab-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(176, 141, 87, 0.4);
        }

        .sticky-action-bar .sab-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: left;
        }

        .status-box.success {
            background: var(--green-light);
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }

        .status-box.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block;
        }

        .status-box.loading {
            background: var(--gray-100);
            color: var(--gray-600);
            border: 1px solid var(--gray-200);
            display: block;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gray-300);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }


        /* ======================== */
        /* 추출된 지식 시각화 영역 */
        /* ======================== */
        .knowledge-results {
            margin-top: 32px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-light) var(--gray-100);
        }

        .knowledge-results.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 20px 24px;
            background: linear-gradient(135deg, #1e293b, #334155);
            border-radius: 14px;
            color: white;
        }

        .results-header-left h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .results-header-left p {
            font-size: 13px;
            opacity: 0.7;
        }

        .results-stats {
            display: flex;
            gap: 16px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 16px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-badge .stat-num {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold-light);
            display: block;
        }

        .stat-badge .stat-label {
            font-size: 11px;
            opacity: 0.7;
        }

        /* 카테고리 필터 탭 */
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .cat-tab {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid var(--gray-200);
            background: var(--white);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--gray-600);
        }

        .cat-tab:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .cat-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .cat-tab .cat-count {
            display: inline-block;
            background: rgba(0, 0, 0, 0.08);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 4px;
        }

        .cat-tab.active .cat-count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 지식 카드 그리드 */
        .knowledge-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .knowledge-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            animation: cardSlideIn 0.4s ease both;
        }

        .knowledge-card:hover {
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(176, 141, 87, 0.12);
            transform: translateY(-2px);
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateX(-15px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px 12px;
            cursor: pointer;
        }

        .card-number {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .card-category {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* 카테고리 컬러 */
        .cat-제품 {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .cat-시공 {
            background: #fef3c7;
            color: #92400e;
        }

        .cat-배송 {
            background: #d1fae5;
            color: #065f46;
        }

        .cat-결제 {
            background: #fce7f3;
            color: #9d174d;
        }

        .cat-기타 {
            background: #e2e8f0;
            color: #475569;
        }

        .cat-견적 {
            background: #ede9fe;
            color: #5b21b6;
        }

        .card-question {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.4;
        }

        .card-toggle {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--gray-100);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: transform 0.3s;
            color: var(--gray-600);
        }

        .card-toggle.open {
            transform: rotate(180deg);
        }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease;
            padding: 0 20px;
        }

        .card-body.open {
            max-height: 600px;
            padding: 0 20px 16px;
        }

        .card-answer {
            font-size: 13.5px;
            color: var(--gray-600);
            line-height: 1.7;
            padding: 12px 16px;
            background: var(--gray-100);
            border-radius: 10px;
            border-left: 3px solid var(--gold);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .card-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .keyword-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            background: rgba(176, 141, 87, 0.08);
            color: var(--gold);
            border: 1px solid rgba(176, 141, 87, 0.15);
            font-weight: 500;
        }

        .toggle-all-btn {
            padding: 8px 18px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: var(--white);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            color: var(--gray-600);
            transition: all 0.2s;
        }

        .toggle-all-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .empty-filter {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 12px;
            }

            .upload-card {
                padding: 20px;
            }

            .results-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .results-stats {
                width: 100%;
            }

            .stat-badge {
                flex: 1;
            }
        }
    </style>
</head>

<body>


    <!-- 헤더 -->
    <div class="header">
        <div class="header-left">
            <span class="header-logo">🧠 InFam</span>
            <span class="header-title">지식 기반 문서 업로드</span>
        </div>
        <div class="header-right">
            <a href="/" class="header-btn">💬 챗봇으로</a>
            <a href="/content.html" class="header-btn">🎬 콘텐츠 자동화</a>
            <a href="/admin.html" class="header-btn">⚙️ FAQ 관리</a>
        </div>
    </div>

    <!-- 메인 -->
    <div class="container">
        <!-- 상단 고정 액션 바 -->
        <div class="sticky-action-bar" id="stickyBar">
            <div class="sab-info">
                📄 <span id="stickyFileCount">0</span>개 파일 선택됨
            </div>
            <button class="sab-btn" id="stickyUploadBtn" onclick="uploadFiles()">🧠 선택한 파일 저장 및 학습하기</button>
        </div>

        <div class="page-header">
            <h1>텍스트 문서 업로드</h1>
            <p>PDF, 메모장(TXT), 엑셀(XLSX) 파일을 업로드하여 챗봇의 지식 베이스를 확장하세요.<br>업로드된 문서는 RAG 벡터 데이터베이스에 즉시 동기화됩니다.</p>
        </div>

        <div class="upload-card">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="drop-icon">📄</div>
                <div class="drop-text">파일을 이곳으로 드래그하거나 클릭하여 선택하세요</div>
                <div class="drop-subtext">지원 형식: .txt, .pdf, .xlsx, .csv (최대 10MB)</div>
                <label for="fileInput" class="btn-select">파일 선택하기</label>
                <input type="file" id="fileInput" class="file-input" multiple accept=".txt,.pdf,.xlsx,.xls,.csv"
                    onchange="handleFiles(this.files)">
            </div>

            <div class="file-list" id="fileList"></div>

            <button class="btn-upload" id="uploadBtn" onclick="uploadFiles()" style="display: none;">🧠 선택한 파일 저장 및
                학습하기</button>

            <div class="status-box" id="statusBox"></div>
        </div>

        <!-- 추출된 지식 시각화 -->
        <div class="knowledge-results" id="knowledgeResults">
            <div class="results-header">
                <div class="results-header-left">
                    <h2>📚 추출된 지식 목록</h2>
                    <p id="resultsSubtitle">AI가 문서에서 추출한 Q&A 지식 조각입니다</p>
                </div>
                <div class="results-stats" id="resultsStats"></div>
            </div>

            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px;">
                <div class="category-tabs" id="categoryTabs"></div>
                <button class="toggle-all-btn" id="toggleAllBtn" onclick="toggleAll()">전체 펼치기</button>
            </div>

            <div class="knowledge-grid" id="knowledgeGrid"></div>
        </div>
    </div>

    <script src="/upload.js"></script>
</body>

</html>
